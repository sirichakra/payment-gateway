<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checkout</title>
  <style>
    body { font-family: Arial; padding: 40px; }
    input, button { padding: 8px; margin: 5px; }
    .hidden { display: none; }
  </style>
</head>

<body>
<div data-test-id="checkout-container">

  <h2>Complete Payment</h2>

  <!-- Order Summary -->
  <div data-test-id="order-summary">
    <div>Amount: <span data-test-id="order-amount">--</span></div>
    <div>Order ID: <span data-test-id="order-id">--</span></div>
  </div>

  <!-- Payment Methods -->
  <div data-test-id="payment-methods">
    <button onclick="showUPI()">UPI</button>
    <button onclick="showCard()">Card</button>
  </div>

  <!-- UPI -->
  <form id="upi-form" class="hidden" onsubmit="payUPI(event)">
    <input id="vpa" placeholder="user@bank" required />
    <button>Pay</button>
  </form>

  <!-- Card -->
  <form id="card-form" class="hidden" onsubmit="payCard(event)">
    <input id="card-number" placeholder="Card Number" required />
    <input id="expiry" placeholder="MM/YY" required />
    <input id="cvv" placeholder="CVV" required />
    <button>Pay</button>
  </form>

  <!-- Processing -->
  <div id="processing" class="hidden">Processing payment...</div>

  <!-- Success -->
  <div id="success" class="hidden">
    <h3>Payment Successful</h3>
    Payment ID: <span id="payment-id"></span>
  </div>

  <!-- Error -->
  <div id="error" class="hidden">
    <h3>Payment Failed</h3>
    <button onclick="location.reload()">Try Again</button>
  </div>

</div>

<script>
const API = "http://localhost:8000";

const params = new URLSearchParams(window.location.search);
const orderId = params.get("order_id");

if (!orderId) {
  alert("Missing order_id in URL");
  throw new Error("order_id missing");
}

document.querySelector('[data-test-id="order-id"]').innerText = orderId;

// Fetch order details
fetch(`${API}/api/v1/orders/${orderId}`)
  .then(r => r.json())
  .then(o => {
    document.querySelector('[data-test-id="order-amount"]').innerText =
      "₹" + (o.amount / 100);
  });

function hideAll() {
  document.getElementById("upi-form").classList.add("hidden");
  document.getElementById("card-form").classList.add("hidden");
  document.getElementById("processing").classList.add("hidden");
}

function showUPI() {
  hideAll();
  document.getElementById("upi-form").classList.remove("hidden");
}

function showCard() {
  hideAll();
  document.getElementById("card-form").classList.remove("hidden");
}

function payUPI(e) {
  e.preventDefault();
  processPayment({
    method: "upi",
    vpa: document.getElementById("vpa").value
  });
}

function payCard(e) {
  e.preventDefault();
  const [m, y] = document.getElementById("expiry").value.split("/");
  processPayment({
    method: "card",
    card: {
      number: document.getElementById("card-number").value,
      expiry_month: m,
      expiry_year: y
    }
  });
}

function processPayment(payload) {
  hideAll();
  document.getElementById("processing").classList.remove("hidden");

  fetch(`${API}/api/v1/payments/public`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ order_id: orderId, ...payload })
  })
    .then(r => r.json())
    .then(p => pollPayment(p.id))
    .catch(showError);
}

function pollPayment(id) {
  const i = setInterval(() => {
    fetch(`${API}/api/v1/payments/${id}/public`)
      .then(r => r.json())
      .then(p => {
        if (p.status === "success") {
          clearInterval(i);
          document.getElementById("processing").classList.add("hidden");
          document.getElementById("success").classList.remove("hidden");
          document.getElementById("payment-id").innerText = id;
        }
        if (p.status === "failed") {
          clearInterval(i);
          showError();
        }
      });
  }, 2000);
}

function showError() {
  hideAll();
  document.getElementById("error").classList.remove("hidden");
}
</script>

</body>
</html>
